<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>リアルタイム・アンチ重なりクラウド</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: #000; color: #fff; 
            font-family: sans-serif; overflow: hidden; height: 100vh; margin: 0; user-select: none; touch-action: manipulation;
        }
        .word-container { position: relative; width: 100%; height: 100%; }
        .word { 
            position: absolute; cursor: pointer; 
            transition: font-size 0.3s ease, color 0.3s ease, left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 900; white-space: nowrap; line-height: 1.1;
            display: flex; flex-direction: column; align-items: center;
            transform: translate(-50%, -50%); /* 中心基準で配置 */
        }
        .count-badge { font-size: 10px; opacity: 0.6; margin-top: 2px; pointer-events: none; }
        
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        input { padding: 15px; font-size: 18px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #444; background: #222; color: #fff; text-align: center; }
        button { padding: 12px 30px; background: #ff4500; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; }
        
        #log-panel { position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1); padding: 10px; font-size: 12px; width: 200px; border-radius: 5px; pointer-events: none; z-index: 1000; }
        #reset-btn { position: fixed; top: 10px; right: 10px; background: rgba(255,255,255,0.15); color: #fff; border: 1px solid #444; font-size: 10px; padding: 5px 10px; cursor: pointer; z-index: 3000; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>名前を入力</h2>
    <input type="text" id="user-name" placeholder="名無しさん" maxlength="10">
    <button id="start-btn">入場する</button>
</div>

<button id="reset-btn">リセット</button>
<div class="word-container" id="container"></div>
<div id="log-panel"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC-FD8cg58fb6erMxFPZYQgvTzxQS544F8",
        authDomain: "nicoojitestproject.firebaseapp.com",
        databaseURL: "https://nicoojitestproject-default-rtdb.firebaseio.com", 
        projectId: "nicoojitestproject",
        storageBucket: "nicoojitestproject.firebasestorage.app",
        messagingSenderId: "1032313219092",
        appId: "1:1032313219092:web:c13276996f8bfcc3dd1f01"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myName = "名無し";
    const foodWords = ["エロトラップダンジョン","生殖機能無い人外がセックス","感覚遮断","3P","服を溶かす薬or粘液","洗脳","よしよしいい子セックス","尻舐め","感覚共有","叔父と姪","エルフ奴隷",アナル開発","剃毛","おっぱいで窒息","家畜","パートナー交換","射精管理","クソデカ系"];
    const elements = [];

    document.getElementById('start-btn').addEventListener('click', () => {
        const val = document.getElementById('user-name').value;
        if(val) myName = val;
        document.getElementById('login-overlay').style.display = 'none';
        setupGame();
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        if(confirm("全リセットしますか？")) {
            db.ref('foods').remove();
            db.ref('logs').remove();
            location.reload();
        }
    });

    function setupGame() {
        const container = document.getElementById('container');
        
        foodWords.forEach((text) => {
            const el = document.createElement('div');
            el.className = 'word';
            el.innerHTML = `<span>${text}</span><span class="count-badge">0</span>`;
            
            // 初回バラバラ配置
            el.style.left = `${Math.random() * 80 + 10}%`;
            el.style.top = `${Math.random() * 80 + 10}%`;
            container.appendChild(el);
            elements.push(el);

            db.ref('foods/' + text).on('value', (snap) => {
                const count = snap.val() || 0;
                const size = Math.min(24 + (count * 4), 90); 
                el.style.fontSize = `${size}px`;
                el.querySelector('.count-badge').innerText = count;
                el.style.color = count > 0 ? `rgb(255, ${Math.max(0, 255-count*15)}, ${Math.max(0, 255-count*30)})` : "#fff";
                el.style.zIndex = count + 10;

                // 重なり回避ロジック発動
                adjustPositions();
            });

            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                db.ref('foods/' + text).transaction(c => (c || 0) + 1);
                db.ref('logs').push(`${myName}が「${text}」を育成！`);
            });
        });

        db.ref('logs').limitToLast(5).on('child_added', (snap) => {
            const entry = document.createElement('div');
            entry.innerText = snap.val();
            const panel = document.getElementById('log-panel');
            panel.appendChild(entry);
            if(panel.childNodes.length > 5) panel.removeChild(panel.firstChild);
        });
    }

    // 簡易衝突回避アルゴリズム
    function adjustPositions() {
        for (let i = 0; i < 5; i++) { // 精度を上げるため数回繰り返す
            elements.forEach(elA => {
                elements.forEach(elB => {
                    if (elA === elB) return;

                    const rA = elA.getBoundingClientRect();
                    const rB = elB.getBoundingClientRect();

                    // 衝突判定（少し余裕を持たせる）
                    const padding = 10;
                    const isOverlapping = !(rB.left - padding > rA.right + padding || 
                                           rB.right + padding < rA.left - padding || 
                                           rB.top - padding > rA.bottom + padding || 
                                           rB.bottom + padding < rA.top - padding);

                    if (isOverlapping) {
                        // 重なっていたら反対方向に押し出す
                        const diffX = (rA.left + rA.width/2) - (rB.left + rB.width/2);
                        const diffY = (rA.top + rA.height/2) - (rB.top + rB.height/2);
                        
                        let moveX = diffX > 0 ? 2 : -2;
                        let moveY = diffY > 0 ? 2 : -2;

                        const newLeft = parseFloat(elA.style.left) + moveX;
                        const newTop = parseFloat(elA.style.top) + moveY;

                        // 画面外へ逃げないように制限(10%~90%以内)
                        if (newLeft > 10 && newLeft < 90) elA.style.left = `${newLeft}%`;
                        if (newTop > 10 && newTop < 90) elA.style.top = `${newTop}%`;
                    }
                });
            });
        }
    }
</script>
</body>
</html>
